<meta charset="utf-8" />

<title>Project View Redesign — Project Switcher Options</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: {
    colors: {
      canvas:'var(--canvas)', panel:'var(--panel)', inset:'var(--inset)', well:'var(--well)',
      accent:'var(--accent)', 'on-accent':'var(--on-accent)',
      fg:'var(--fg)', 'fg-2':'var(--fg-2)', 'fg-dim':'var(--fg-dim)', 'fg-muted':'var(--fg-muted)', 'fg-faint':'var(--fg-faint)',
      edge:'var(--edge)', 'edge-dim':'var(--edge-dim)',
    },
    borderRadius:{ DEFAULT:'4px', sm:'4px', md:'8px', lg:'12px', xl:'16px', full:'9999px' },
    fontFamily:{ mono:['Cascadia Code','ui-monospace','Consolas','monospace'] },
  }}}
</script>
<style>
  [data-theme="light"]{ --canvas:#F2F2F2; --panel:#EAEAEA; --inset:#E0E0E0; --well:#F7F7F7;
    --accent:#1A1A1A; --on-accent:#F2F2F2; --fg:#1A1A1A; --fg-2:#444; --fg-dim:#666; --fg-muted:#888; --fg-faint:#AAA;
    --edge:#CFCFCF; --edge-dim:#DCDCDC80; --shadow:0.12; }
  [data-theme="dark"]{ --canvas:#111; --panel:#191919; --inset:#222; --well:#1C1C1C;
    --accent:#D4D4D4; --on-accent:#111; --fg:#E0E0E0; --fg-2:#B0B0B0; --fg-dim:#999; --fg-muted:#666; --fg-faint:#444;
    --edge:#2E2E2E; --edge-dim:#37373780; --shadow:0.45; }
  html,body{height:100%;margin:0;background:var(--canvas);}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--fg);}
  *{box-sizing:border-box;}
  .layer-surface{ background:var(--panel); border:1px solid var(--edge); border-radius:16px;
    box-shadow:0 8px 32px rgba(0,0,0,var(--shadow,.12)); overflow:hidden; }
  .lbl{ font-size:10px; font-weight:500; letter-spacing:.08em; text-transform:uppercase; color:var(--fg-muted); }
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:var(--edge);border-radius:6px;border:2px solid var(--canvas);}
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.38);backdrop-filter:blur(2px);z-index:60;}
  .md h1{font-size:18px;font-weight:650;margin:.1em 0 .55em;}
  .md h2{font-size:14px;font-weight:650;margin:1.15em 0 .4em;border-bottom:1px solid var(--edge-dim);padding-bottom:3px;}
  .md p{margin:.5em 0;color:var(--fg-2);font-size:13.5px;line-height:1.65;}
  .md code{font-family:'Cascadia Code',monospace;font-size:12px;background:var(--inset);padding:1px 5px;border-radius:4px;}
  .md strong{color:var(--fg);font-weight:650;}
  .editarea{width:100%;min-height:320px;font-family:'Cascadia Code',monospace;font-size:12.5px;line-height:1.65;border:1px solid var(--edge);border-radius:8px;padding:12px;background:var(--canvas);color:var(--fg);outline:none;resize:vertical;}
</style>
</head>

        '<button data-act="dismiss-intro" title="Dismiss — won’t show again" class="absolute top-2 right-2 w-6 h-6 rounded-md inline-flex items-center justify-center text-fg-muted hover:text-fg hover:bg-well">'+svg('close',14)+'</button>'+
      '</div>';
    // (i) at the end of each group line opens the shared "How context works" popup on the right topic.
    const grp=(lab,hint,items,info)=>'<div class="mb-5"><div class="flex items-center gap-2 mb-2 px-1">'+
      '<span class="lbl">'+lab+'</span><span class="text-[11.5px] text-fg-muted">'+hint+'</span>'+
      '<button data-info="'+info+'" title="Learn how these work" class="ml-auto w-6 h-6 rounded-md inline-flex items-center justify-center text-fg-muted hover:text-fg hover:bg-inset shrink-0">'+svg('info',15)+'</button>'+
      '</div><div class="flex flex-col gap-2">'+items.map(ctxRow).join('')+'</div></div>';
    body = explainer
      + grp('This project','May be loaded for conversations in this project',CTX.project,'claude')
      + grp('Global','Loaded before every conversation on this device',CTX.global,'global')
      + grp('Memory','Recalled when relevant to a conversation',CTX.memory,'memory');
  } else if (S.cat==='convs'){ body = '<div class="flex flex-col gap-2">'+CONVS.map(convRow).join('')+'</div>'; }
  else { body = '<div class="grid gap-3" style="grid-template-columns:repeat(auto-fill,minmax(180px,1fr))">'+ARTS.map(artCard).join('')+'</div>'; }
  const toolbar = S.cat==='artifacts' ? '<div class="flex items-center gap-1.5">'+chip('Hide code & configs',true)+chip('Show deleted',false)+'</div>'
    : (S.cat==='convs' ? '<div class="flex items-center gap-1.5">'+chip('Recent',true)+chip('Most messages',false)+'</div>'
    : '<div class="flex items-center gap-1.5">'+chip('Project',true)+chip('Global',true)+chip('Memory',true)+'</div>');

  document.getElementById('root').innerHTML =
    header()+
    '<main class="flex-1 overflow-y-auto min-w-0"><div class="max-w-[1100px] mx-auto px-6 py-5 flex flex-col gap-5">'+
      hero()+
      '<div class="flex items-center justify-between gap-3 flex-wrap">'+seg+'<div class="flex items-center gap-2">'+searchInput('Search '+S.cat+'…','w-[220px]')+toolbar+'</div></div>'+
      '<div>'+body+'</div>'+
    '</div></main>';
}

// ── Detail overlay (shared) ────────────────────────────────────────────
function renderDetail(){ const old=document.getElementById('ov'); if(old) old.remove(); if(!S.open) return;
  const [t,id]=S.open.split(':'); let title='',tools='',meta='',body='';
  if(t==='ctx'){ const f=allCtx().find(x=>x.id===id); title=f.name.split('/').pop();
    tools=(S.editing?'<button data-act="save" class="px-3.5 py-1.5 rounded-md bg-accent text-on-accent text-[12.5px] inline-flex items-center gap-1.5">'+svg('check',13)+'Save</button><button data-act="canceledit" class="px-3 py-1.5 rounded-md bg-inset text-fg border border-edge text-[12.5px]">Cancel</button>'
      :'<button data-act="edit" class="px-3.5 py-1.5 rounded-md bg-accent text-on-accent text-[12.5px] inline-flex items-center gap-1.5">'+svg('pencil',13)+'Edit</button>')+
      '<button class="px-3 py-1.5 rounded-md bg-inset text-fg-2 hover:text-fg border border-edge-dim hover:border-edge text-[12.5px] inline-flex items-center gap-1.5">'+svg('folder',13)+'Reveal</button>'+
      '<button class="px-3 py-1.5 rounded-md bg-inset text-fg-2 hover:text-fg border border-edge-dim hover:border-edge text-[12.5px] inline-flex items-center gap-1.5">'+svg('link',13)+'Copy path</button>';
    meta=scopeBadge(f.scope)+loadPill(f)+'<span class="text-fg-faint">·</span><span>'+f.size+'</span><span class="text-fg-faint">·</span><span>edited 2d ago</span>';
    let banner='';
    if(f.warn==='global') banner='<div class="flex gap-2.5 p-3 rounded-lg mb-4 text-[12.5px] leading-relaxed border" style="color:#9a6a00;background:#FFF6E5;border-color:#E8C170"><span class="shrink-0 mt-px">'+svg('warn',16)+'</span><div><strong>Global file — affects every project.</strong> Edits here change how Claude works in <em>all</em> folders on this machine, not just '+proj().name+'.</div></div>';
    else if(f.warn==='project') banner='<div class="flex gap-2.5 p-3 rounded-lg mb-4 text-[12.5px] leading-relaxed bg-inset border border-edge text-fg-2"><span class="shrink-0 mt-px text-fg-dim">'+svg('warn',16)+'</span><div><strong>Project instructions.</strong> Editing this changes how Claude behaves across every session in <strong>'+proj().name+'</strong>.</div></div>';
    body=banner+(S.editing?'<textarea class="editarea">'+esc(SAMPLE_MD)+'</textarea>':'<div class="md">'+mdToHtml(SAMPLE_MD)+'</div>');
  } else if(t==='conv'){ const c=CONVS.find(x=>x.id===id); title=c.title;
    tools='<button class="px-3.5 py-1.5 rounded-md bg-accent text-on-accent text-[12.5px] inline-flex items-center gap-1.5">'+svg('play',13)+'Resume in Claude</button><button class="px-3 py-1.5 rounded-md bg-inset text-fg-2 hover:text-fg border border-edge-dim hover:border-edge text-[12.5px]">Open full transcript</button>';
    meta='<span>'+c.msgs+' messages</span><span class="text-fg-faint">·</span><span>'+c.time+'</span><span class="text-fg-faint">·</span><span>read-only preview</span>';
    body='<div class="max-w-[680px]">'+SAMPLE_TR.map(m=>'<div class="mb-4"><div class="lbl mb-1.5 '+(m.role==='user'?'!text-fg-2':'')+'">'+(m.role==='user'?'You':'Claude')+'</div><div class="text-[13px] text-fg-2 border rounded-lg px-3.5 py-2.5 whitespace-pre-wrap '+(m.role==='user'?'bg-inset border-edge':'bg-canvas border-edge-dim')+'">'+esc(m.text)+'</div></div>').join('')+'<div class="text-center text-[11.5px] text-fg-muted py-2">— showing last 4 of '+c.msgs+' messages —</div></div>';
  } else { const a=ARTS.find(x=>x.id===id); title=a.name;
    tools='<button class="px-3.5 py-1.5 rounded-md bg-accent text-on-accent text-[12.5px] inline-flex items-center gap-1.5">'+svg('pencil',13)+'Edit</button><button class="px-3 py-1.5 rounded-md bg-inset text-fg-2 hover:text-fg border border-edge-dim hover:border-edge text-[12.5px]">Reveal</button><button class="px-3 py-1.5 rounded-md bg-inset text-fg-2 hover:text-fg border border-edge-dim hover:border-edge text-[12.5px]">Copy path</button>';
    meta='<span>edited</span><span class="text-fg-faint">·</span><span>2d ago</span><span class="text-fg-faint">·</span><span>4.2 KB</span>';
    body='<div class="md max-w-[760px]">'+mdToHtml('# '+a.name+'\n\nThis is the artifact content viewer — the same `ActiveArtifactView` the session drawer uses, in a full-width focused overlay.\n\n## Section\n\nLorem ipsum dolor sit amet, **consectetur** adipiscing elit. Sed do eiusmod tempor incididunt ut labore.')+'</div>'; }
  const ov=document.createElement('div'); ov.id='ov';
  ov.innerHTML='<div class="scrim" data-act="dclose"></div>'+
    '<div class="layer-surface fixed inset-3 sm:inset-10 md:inset-x-[12%] md:inset-y-[8%] z-[70] flex flex-col">'+
      '<header class="flex items-center justify-between gap-3 px-4 py-3 border-b border-edge shrink-0"><span class="text-[15px] font-semibold text-fg truncate">'+esc(title)+'</span>'+
        '<div class="flex items-center gap-1.5">'+tools+'<button data-act="dclose" class="ml-1 text-fg-dim hover:text-fg w-7 h-7 inline-flex items-center justify-center">'+svg('close',17)+'</button></div></header>'+
      '<div class="flex items-center gap-2 px-4 py-1.5 text-[11.5px] text-fg-muted border-b border-edge-dim bg-well shrink-0">'+meta+'</div>'+
      '<div class="flex-1 overflow-y-auto px-5 py-4">'+body+'</div></div>';
  document.body.appendChild(ov);
}
function mdToHtml(md){ return md.split('\n').map(l=>{ if(l.indexOf('## ')===0)return '<h2>'+inl(l.slice(3))+'</h2>'; if(l.indexOf('# ')===0)return '<h1>'+inl(l.slice(2))+'</h1>'; if(l.trim()==='')return ''; return '<p>'+inl(l)+'</p>'; }).join(''); }
function inl(s){ return esc(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/`(.+?)`/g,'<code>$1</code>'); }

// ── Shared "How context works" popup (opened from each group's (i)) ────
const INFO_TABS = [
  { id:'overview', label:'Overview', icon:'layout' },
  { id:'claude',   label:'CLAUDE.md', icon:'doc' },
  { id:'agents',   label:'AGENTS.md', icon:'doc' },
  { id:'rules',    label:'Rules', icon:'list' },
  { id:'memory',   label:'Memory', icon:'brain' },
];
const INFO = {
  claude:{ icon:'doc', h:'CLAUDE.md', tag:'Your standing instructions for a project.',
    facts:[['Scope','Project or global'],['When it loads','Every conversation'],['Lives at','CLAUDE.md']],
    secs:[
      ['What it is','Your main instructions for a project. Claude treats CLAUDE.md like standing orders — coding style, things to avoid, and how you like work done.'],
      ['When Claude reads it','At the start of every conversation in that folder. A global ~/.claude/CLAUDE.md applies everywhere. It’s always loaded, so keep it focused.'],
    ],
    example:['# CLAUDE.md','','## Working rules','- Never touch the live built app — test via run-dev.sh','- Use worktrees for non-trivial work','- Add a WHY comment on non-trivial edits'].join('\n') },
  agents:{ icon:'doc', h:'AGENTS.md', tag:'The cross-tool instruction standard.',
    facts:[['Scope','Project'],['When it loads','Every conversation'],['Read by','Claude, opencode, Codex…']],
    secs:[
      ['What it is','The same idea as CLAUDE.md, but the shared open standard other AI coding tools read too — opencode, Codex, Cursor, and more.'],
      ['When to use it','Put cross-tool instructions here so every tool behaves consistently. Claude reads it alongside CLAUDE.md.'],
    ],
    example:['# AGENTS.md','','Build:  npm run build','Test:   npm test','Style:  2-space indent','','# Read by Claude, opencode, Codex, Cursor…'].join('\n') },
  rules:{ icon:'list', h:'Rules', tag:'Instructions that load only when they’re relevant.',
    facts:[['Scope','Project or global'],['When it loads','Only for matching files'],['Lives at','.claude/rules/']],
    secs:[
      ['What it is','Focused instruction files that apply conditionally. Each can target a path — for example, “only when editing files under app/**”.'],
      ['Why they help','They keep your always-on instructions short while deep guidance stays on tap exactly when it’s needed.'],
    ],
    example:['---','description: Android runtime constraints','globs: app/**','alwaysApply: false','---','','LD_LIBRARY_PATH is mandatory. All binaries','route through /system/bin/linker64…'].join('\n') },
  memory:{ icon:'brain', h:'Memory', tag:'What Claude remembers — and recalls when it helps.',
    facts:[['Scope','This project only'],['When it loads','Recalled when relevant'],['Index','MEMORY.md']],
    secs:[
      ['What it is','Short notes Claude saves so it doesn’t re-learn things each time — your preferences, decisions you’ve made, and recurring gotchas. One fact per file.'],
      ['How Claude saves them','Claude decides what’s worth keeping — usually something durable it couldn’t just re-read from your code or history. You don’t have to ask; it writes the note and lists it in an index (MEMORY.md).'],
      ['How Claude recalls them','It doesn’t search on demand. The index loads at the start of every conversation, and the notes that look relevant to what you’re doing are pulled into context automatically.'],
      ['Where they live','Saved with this project — not shared globally. What Claude learns here stays here.'],
    ],
    example:['---','type: feedback','---','','All runtime testing goes through run-dev.sh —','never touch the live built app.'].join('\n') },
};
// Overview tab: a visual of what loads, in what order, and which wins.
function overviewContent(){
  const layers = [
    ['globe','Global','~/.claude/CLAUDE.md','Always · every project'],
    ['doc','This project','CLAUDE.md · AGENTS.md','Always · this folder · overrides global'],
    ['list','Rules','.claude/rules/','Only when you touch matching files'],
    ['brain','Memory','MEMORY.md + saved facts','Recalled when relevant to your message'],
  ];
  const stack = layers.map((l,i)=>
    '<div class="flex items-center gap-3 p-3 rounded-lg bg-panel border border-edge-dim">'+
      '<span class="w-9 h-9 rounded-md bg-inset border border-edge-dim inline-flex items-center justify-center text-fg-dim shrink-0">'+svg(l[0],17)+'</span>'+
      '<div class="min-w-0 flex-1"><div class="text-[13.5px] font-medium text-fg">'+l[1]+'</div><div class="font-mono text-[11px] text-fg-muted truncate">'+l[2]+'</div></div>'+
      '<div class="text-[11.5px] text-fg-dim text-right shrink-0 max-w-[210px]">'+l[3]+'</div></div>'+
    (i<layers.length-1?'<div class="pl-[30px] text-fg-faint text-[12px] leading-none py-0.5">↓</div>':'')
  ).join('');
  return '<h3 class="text-[17px] font-semibold text-fg leading-tight">How context works</h3>'+
    '<p class="text-[12.5px] text-fg-muted mt-0.5 mb-4">Everything Claude reads before it starts — and which wins when they disagree.</p>'+
    '<p class="text-[13px] text-fg-2 leading-relaxed mb-3.5">Claude builds its understanding of your project from several sources, all loaded automatically. They stack from broad to specific:</p>'+
    '<div class="flex flex-col gap-2">'+stack+'</div>'+
    '<div class="mt-4 flex gap-2.5 p-3 rounded-lg bg-inset border border-edge-dim text-[12.5px] text-fg-2 leading-relaxed">'+
      '<span class="text-fg-dim shrink-0 mt-px">'+svg('info',16)+'</span><div><strong class="text-fg">When two files disagree, the more specific one wins.</strong> A project’s CLAUDE.md overrides the global one; always-on instructions take priority over conditional rules and recalled memory.</div></div>';
}
function infoContent(id){
  if(id==='overview') return overviewContent();
  const t = INFO[id] || INFO.claude;
  const head = '<div class="flex items-start gap-3 mb-4">'+
    '<span class="w-10 h-10 rounded-lg bg-inset border border-edge-dim inline-flex items-center justify-center text-fg-dim shrink-0">'+svg(t.icon,20)+'</span>'+
    '<div class="min-w-0"><h3 class="text-[17px] font-semibold text-fg leading-tight font-mono">'+t.h+'</h3><p class="text-[12.5px] text-fg-muted mt-0.5">'+t.tag+'</p></div></div>';
  const facts = '<div class="flex flex-wrap gap-x-6 gap-y-2 mb-4 pb-4 border-b border-edge-dim">'+
    t.facts.map(f=>'<div><div class="lbl mb-0.5">'+f[0]+'</div><div class="text-[12.5px] text-fg-2">'+f[1]+'</div></div>').join('')+'</div>';
  const secs = t.secs.map(s=>'<div class="mb-3.5"><div class="lbl mb-1">'+s[0]+'</div><p class="text-[13px] text-fg-2 leading-relaxed">'+s[1]+'</p></div>').join('');
  const ex = t.example ? '<div class="lbl mb-1.5">Example</div><pre class="bg-canvas border border-edge-dim rounded-lg p-3 text-[11.5px] font-mono text-fg-2 overflow-x-auto whitespace-pre leading-relaxed m-0">'+esc(t.example)+'</pre>' : '';
  return head+facts+secs+ex;
}
function renderInfo(){ const old=document.getElementById('infoov'); if(old) old.remove(); if(!S.info) return;
  const tabs = INFO_TABS.map(t=>'<button data-infotab="'+t.id+'" class="w-full text-left flex items-center gap-2.5 px-3 py-2 rounded-md text-[13px] transition-colors '+(t.id===S.info?'bg-inset text-fg font-medium':'text-fg-2 hover:bg-inset hover:text-fg')+'"><span class="'+(t.id===S.info?'text-fg':'text-fg-muted')+'">'+svg(t.icon,15)+'</span>'+t.label+'</button>').join('');
  const el=document.createElement('div'); el.id='infoov';
  el.innerHTML='<div class="scrim" data-act="info-close"></div>'+
    '<div class="layer-surface fixed left-1/2 -translate-x-1/2 top-[10%] w-[min(720px,94vw)] max-h-[80vh] z-[75] !rounded-xl flex flex-col">'+
      '<header class="flex items-center justify-between px-4 py-3 border-b border-edge shrink-0"><span class="text-[15px] font-semibold text-fg">How context works</span>'+
        '<button data-act="info-close" class="text-fg-dim hover:text-fg w-7 h-7 inline-flex items-center justify-center">'+svg('close',17)+'</button></header>'+
      '<div class="flex-1 flex min-h-0">'+
        '<aside class="w-[190px] shrink-0 border-r border-edge-dim p-2 flex flex-col gap-1 overflow-y-auto">'+tabs+'</aside>'+
        '<div class="flex-1 overflow-y-auto px-5 py-5">'+infoContent(S.info)+'</div></div>'+
    '</div>';
  document.body.appendChild(el);
}

// ── Render + events ────────────────────────────────────────────────────
function renderSwitcher(){ const old=document.getElementById('swc'); if(old) old.remove(); if(S.swOpen) document.body.appendChild(switcherPaletteEl()); }
function renderScreen(){ renderHub(); renderDetail(); renderSwitcher(); renderInfo(); }

document.addEventListener('click', e=>{
  const t=e.target.closest('[data-proj],[data-cat],[data-open],[data-info],[data-infotab],[data-act]'); if(!t) return;
  if(t.hasAttribute('data-info')){ S.info=t.getAttribute('data-info'); renderInfo(); return; }
  if(t.hasAttribute('data-infotab')){ S.info=t.getAttribute('data-infotab'); renderInfo(); return; }
  if(t.hasAttribute('data-proj')){ S.pid=t.getAttribute('data-proj'); S.swOpen=false; S.open=null; renderScreen(); return; }
  if(t.hasAttribute('data-cat')){ S.cat=t.getAttribute('data-cat'); renderScreen(); return; }
  if(t.hasAttribute('data-open')){ S.open=t.getAttribute('data-open'); S.editing=false; renderDetail(); return; }
  const act=t.getAttribute('data-act');
  if(act==='open-switcher'){ S.swOpen=!S.swOpen; renderScreen(); }
  else if(act==='sw-close'){ S.swOpen=false; renderScreen(); }
  else if(act==='edit'){ S.editing=true; renderDetail(); }
  else if(act==='save'||act==='canceledit'){ S.editing=false; renderDetail(); }
  else if(act==='dclose'){ S.open=null; S.editing=false; renderDetail(); }
  else if(act==='info-close'){ S.info=null; renderInfo(); }
  else if(act==='dismiss-intro'){ try{ localStorage.setItem('pv-context-intro-dismissed','1'); }catch(e){} renderScreen(); }
});

renderScreen();
</script>
